name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Gateway.API/**"
      - "BuildingBlocks/**"
      - ".github/workflows/**"

env:
  ACR: restaurantqracr.azurecr.io
  RG: RestaurantQR-RG

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore dependencies
        run: dotnet restore
      - name: Build # ← tách build ra
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --no-restore --verbosity normal
  deploy:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: identity-api
            dockerfile: src/Services/Identity.API/Dockerfile
            app: identity-api
          - service: menu-api
            dockerfile: src/Services/Menu.API/Dockerfile
            app: menu-api
          - service: order-api
            dockerfile: src/Services/Order.API/Dockerfile
            app: order-api
          - service: reservation-api
            dockerfile: src/Services/Reservation.API/Dockerfile
            app: reservation-api
          - service: gateway
            dockerfile: Gateway.API/Dockerfile
            app: gateway

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: restaurantqracr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        run: |
          IMAGE=${{ env.ACR }}/${{ matrix.service }}:${{ github.sha }}
          docker build -f ${{ matrix.dockerfile }} -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Container App
        run: |
          IMAGE=${{ env.ACR }}/${{ matrix.service }}:${{ github.sha }}
          az containerapp update \
            --name ${{ matrix.app }} \
            --resource-group ${{ env.RG }} \
            --image $IMAGE
