name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Gateway.API/**'
      - 'BuildingBlocks/**'

env:
  ACR: restaurantqracr.azurecr.io
  RG:  RestaurantQR-RG

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: identity-api
            dockerfile: src/Services/Identity.API/Dockerfile
            app: identity-api
          - service: menu-api
            dockerfile: src/Services/Menu.API/Dockerfile
            app: menu-api
          - service: order-api
            dockerfile: src/Services/Order.API/Dockerfile
            app: order-api
          - service: reservation-api
            dockerfile: src/Services/Reservation.API/Dockerfile
            app: reservation-api
          - service: gateway
            dockerfile: Gateway.API/Dockerfile
            app: gateway

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name restaurantqracr

      - name: Build & push image
        run: |
          IMAGE=${{ env.ACR }}/${{ matrix.service }}:${{ github.sha }}
          docker build -f ${{ matrix.dockerfile }} -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Container App
        run: |
          IMAGE=${{ env.ACR }}/${{ matrix.service }}:${{ github.sha }}
          az containerapp update \
            --name ${{ matrix.app }} \
            --resource-group ${{ env.RG }} \
            --image $IMAGE